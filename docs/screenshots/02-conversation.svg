    <text x="38" y="250" fill="#f1f5f9" font-size="11">poblada del mundo, con más de</text>
    <text x="38" y="268" fill="#f1f5f9" font-size="11">37 millones de habitantes en</text>
    <text x="38" y="286" fill="#f1f5f9" font-size="11">su área metropolitana.</text>
